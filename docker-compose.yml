services:

  db:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  api:
    build: .
    container_name: fastapi-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db

    ports:
      - "8001:8000"



volumes:
  postgres_data: